<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Neurovisual Monocular Self-Check — Lexilens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════════════════
     DESIGN TOKENS — Lexilens warm palette
  ═══════════════════════════════════════════════════ */
  :root {
    /* Backgrounds */
    --bg-cream: #faf6ee;
    --bg-cream-warm: #f5efde;
    --bg-white: #ffffff;
    --bg-card: #ffffff;

    /* Lexilens brand colors */
    --brand-blue: #1B4F8C;
    --brand-blue-light: #2E6DB4;
    --brand-blue-dark: #0d2d54;
    --brand-blue-soft: #e8f0fa;

    /* Accent (orange/gold from site) */
    --accent: #F5A623;
    --accent-light: #ffc14d;

    /* Text */
    --ink-dark: #0d1f35;
    --ink-mid: #1a2e2c;
    --ink-soft: #4a6480;
    --ink-mute: #6080a0;

    /* Status */
    --success: #2ebc60;
    --warning: #e87461;

    /* Misc */
    --shadow-sm: 0 2px 12px rgba(27, 79, 140, 0.07);
    --shadow-md: 0 4px 24px rgba(27, 79, 140, 0.12);
    --shadow-lg: 0 12px 40px rgba(27, 79, 140, 0.18);
    --radius: 16px;
    --radius-lg: 24px;
    --ease: cubic-bezier(0.4, 0, 0.2, 1);
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg-cream);
    color: var(--ink-dark);
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }

  body {
    background:
      radial-gradient(ellipse 60% 50% at 80% 20%, rgba(27, 79, 140, 0.04), transparent 60%),
      radial-gradient(ellipse 70% 60% at 20% 80%, rgba(245, 166, 35, 0.05), transparent 60%),
      var(--bg-cream);
    position: relative;
  }
  body.test-white { background: #ffffff; }

  #app {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #screens-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    min-height: 0;
  }

  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 500ms var(--ease);
    overflow-x: hidden;
    overflow-y: hidden; /* le container gère le scroll */
  }
  .screen.active { opacity: 1; pointer-events: auto; }

  /* ═══════════ TOP BAR ═══════════ */
  .top-bar {
    position: relative;
    flex-shrink: 0;
    padding: clamp(8px, 1.2vh, 14px) clamp(16px, 2.5vw, 32px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
    gap: 12px;
    background: var(--bg-cream);
  }
  body.test-white .top-bar {
    background: #ffffff;
  }
  body.test-white .top-bar .top-bar-hide-on-test {
    display: none;
  }

  .brand-logo {
    height: 36px;
    width: auto;
    display: block;
  }
  .brand-logo-img {
    height: 100%;
    width: auto;
    display: block;
  }

  .top-controls { display: flex; align-items: center; gap: 10px; }

  .lang-switch {
    display: flex;
    background: var(--bg-white);
    border: 1.5px solid var(--brand-blue-soft);
    border-radius: 999px;
    padding: 3px;
    box-shadow: var(--shadow-sm);
  }
  .lang-btn {
    background: transparent;
    border: none;
    color: var(--ink-soft);
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 200ms var(--ease);
    letter-spacing: 0.05em;
  }
  .lang-btn.active {
    background: var(--brand-blue);
    color: var(--bg-white);
  }

  .audio-toggle {
    width: 42px; height: 42px;
    border-radius: 50%;
    border: 1.5px solid var(--brand-blue-soft);
    background: var(--bg-white);
    color: var(--brand-blue);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 200ms var(--ease);
    box-shadow: var(--shadow-sm);
  }
  .audio-toggle:hover {
    border-color: var(--brand-blue);
    background: var(--brand-blue-soft);
  }
  .audio-toggle.on {
    background: var(--brand-blue);
    border-color: var(--brand-blue);
    color: var(--bg-white);
  }
  .audio-toggle.speaking { animation: speakingPulse 1s ease-in-out infinite; }
  @keyframes speakingPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(27, 79, 140, 0.4), var(--shadow-sm); }
    50% { box-shadow: 0 0 0 10px rgba(27, 79, 140, 0), var(--shadow-sm); }
  }
  .audio-toggle svg { width: 18px; height: 18px; }

  .audio-toast {
    position: fixed;
    top: 76px; right: 32px;
    background: var(--ink-dark);
    color: var(--bg-white);
    padding: 10px 18px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: var(--shadow-md);
    z-index: 100;
    opacity: 0;
    transform: translateY(-10px);
    transition: all 300ms var(--ease-spring);
    pointer-events: none;
    max-width: 280px;
  }
  .audio-toast.show { opacity: 1; transform: translateY(0); }
  .audio-toast.error {
    background: var(--warning);
  }

  /* ═══════════ LAYOUT ═══════════ */
  .container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2vh;
    padding: 2vh 3vw;
    max-width: 1100px;
    margin: 0 auto;
    text-align: center;
    overflow-x: hidden;
    overflow-y: auto;       /* scroll vertical si contenu > écran */
    box-sizing: border-box;
  }
  /* Result screen : scrollable */
  #screen-result .container {
    overflow-y: auto;
    justify-content: flex-start;
    padding-top: max(2vh, 12px);
    padding-bottom: max(2vh, 16px);
  }

  /* Question screen : scroll vertical si besoin */
  #screen-question {
    overflow-x: hidden;
    overflow-y: hidden;
  }
  #screen-question .container {
    overflow-x: hidden;
    overflow-y: auto;
    justify-content: flex-start;
    padding-top: max(1vh, 8px);
    padding-bottom: max(1vh, 8px);
    gap: clamp(4px, 0.8vh, 10px);
  }
  #screen-question .result-card {
    overflow: visible;
    flex: none;
    display: flex;
    flex-direction: column;
    gap: clamp(4px, 0.6vh, 8px);
  }
  #screen-question .result-title {
    font-size: clamp(14px, 2vw, 22px);
    margin-bottom: 0;
  }
  #screen-question .result-subtext {
    font-size: clamp(11px, 1vw, 14px);
    margin-bottom: 0;
  }
  #screen-question .result-logo {
    height: clamp(28px, 4vh, 44px);
    margin-bottom: 0;
  }

  /* ═══════════ TYPOGRAPHY ═══════════ */
  h1 {
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: clamp(20px, 2.8vw, 40px);
    line-height: 1.1;
    color: var(--brand-blue);
    margin: 0;
    letter-spacing: -0.02em;
  }
  h1 em {
    font-style: normal;
    color: var(--accent);
    position: relative;
    white-space: nowrap;
  }
  h1 em::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -2px;
    height: 8px;
    background: var(--accent);
    opacity: 0.2;
    border-radius: 4px;
    z-index: -1;
  }

  h2 {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: clamp(18px, 2vw, 28px);
    line-height: 1.2;
    color: var(--brand-blue);
    margin-bottom: 12px;
  }

  p.lead {
    font-size: clamp(14px, 1.3vw, 17px);
    color: var(--ink-soft);
    max-width: 720px;
    margin-bottom: 0;
    line-height: 1.5;
  }

  .eyebrow:empty { display: none; margin: 0; }
  .eyebrow {
    display: inline-block;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  /* ═══════════ BUTTONS ═══════════ */
  .btn {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: clamp(14px, 1.2vw, 16px);
    padding: 1.2vh 2.5vw;
    border-radius: 40px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 250ms var(--ease-spring);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 5vh;
    text-decoration: none;
    letter-spacing: 0.01em;
  }
  .btn-primary {
    background: var(--brand-blue);
    color: var(--bg-white);
    border-color: var(--brand-blue);
    box-shadow: 0 4px 20px rgba(27, 79, 140, 0.25);
  }
  .btn-primary:hover {
    background: var(--brand-blue-light);
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(27, 79, 140, 0.35);
  }
  .btn-primary:active { transform: translateY(0); }

  .btn-accent {
    background: var(--accent);
    color: var(--ink-dark);
    border-color: var(--accent);
    box-shadow: 0 4px 20px rgba(245, 166, 35, 0.35);
  }
  .btn-accent:hover {
    background: var(--accent-light);
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(245, 166, 35, 0.45);
  }

  .btn-ghost {
    background: transparent;
    color: var(--brand-blue);
    border: 2px solid var(--brand-blue);
  }
  .btn-ghost:hover {
    background: var(--brand-blue);
    color: var(--bg-white);
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none !important;
    box-shadow: none !important;
  }

  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

  /* ═══════════ 1. WELCOME — image pleine largeur ═══════════ */
  .welcome-hero {
    width: 100%;
    max-width: 900px;
    flex: 1 1 auto;
    min-height: clamp(120px, 20vh, 400px); /* ne disparaît jamais */
    margin: 0 auto;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: var(--shadow-lg);
  }
  .welcome-hero img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
    display: block;
    background: var(--bg-cream-warm);
  }

  .prereqs {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1vw;
    max-width: 900px;
    width: 100%;
    flex-shrink: 0;
  }
  .prereq {
    background: var(--bg-white);
    border-radius: 16px;
    padding: clamp(8px, 1.2vh, 14px) clamp(8px, 1vw, 16px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    text-align: center;
    box-shadow: var(--shadow-sm);
    transition: all 250ms var(--ease);
    border: 1px solid var(--brand-blue-soft);
  }
  .prereq:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
    border-color: var(--brand-blue);
  }
  .prereq-icon {
    font-size: clamp(20px, 2vw, 28px);
    line-height: 1;
  }
  .prereq-title {
    font-weight: 700;
    color: var(--brand-blue);
    font-size: clamp(12px, 1.1vw, 15px);
    line-height: 1.3;
  }
  .prereq-sub {
    font-size: clamp(11px, 0.9vw, 13px);
    color: var(--ink-mute);
  }

  /* ═══════════ 2. GUIDELINES ═══════════ */
  .guidelines-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2vw;
    align-items: stretch;
    max-width: 900px;
    width: 100%;
    flex: 1 1 auto;
    min-height: clamp(200px, 35vh, 600px);
    overflow: visible;
  }
  .guidelines-hero {
    border-radius: 20px;
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    min-height: 0;
    display: flex;
    align-items: center;
    background: var(--bg-cream-warm);
  }
  .guidelines-hero img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
    display: block;
  }

  .guidelines-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 1.2vh;
    overflow: visible;
  }
  .guidelines-list li {
    background: var(--bg-white);
    border-radius: 14px;
    padding: 1.2vh 14px 1.2vh 42px;
    color: var(--ink-dark);
    font-size: clamp(13px, 1.1vw, 15px);
    line-height: 1.35;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--brand-blue-soft);
    position: relative;
    transition: all 250ms var(--ease);
  }
  .guidelines-list li:hover {
    border-color: var(--brand-blue);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }
  .guidelines-list li::before {
    content: "✓";
    position: absolute;
    left: 14px; top: 13px;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--success);
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }

  /* ═══════════ 3. PREVIEW / WATCH SEQUENCE ═══════════ */
  .preview-stage {
    width: 100%;
    max-width: 640px;
    flex: 1 1 auto;
    min-height: clamp(180px, 30vh, 500px); /* ne disparaît jamais */
    margin: 0 auto;
    position: relative;
    background: var(--bg-white);
    border-radius: 28px;
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--brand-blue-soft);
  }

  .preview-step {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 50px 16px 16px; /* espace pour les badges num/timer en haut */
    opacity: 0;
    transition: opacity 500ms var(--ease);
    overflow: hidden;
  }
  .preview-step.show { opacity: 1; }

  .preview-img {
    width: clamp(120px, 45%, 320px);
    height: clamp(120px, 45%, 320px);
    max-width: 85%;
    flex-shrink: 1;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: var(--shadow-md);
  }
  .preview-img img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Caption dans le flux — ne chevauche plus l'image */
  .preview-caption {
    position: static;
    transform: none;
    background: var(--brand-blue);
    color: var(--bg-white);
    font-weight: 600;
    font-size: clamp(12px, 1.1vw, 15px);
    padding: clamp(8px,1vh,14px) clamp(12px,2vw,24px);
    border-radius: 40px;
    max-width: 88%;
    width: max-content;
    text-align: center;
    box-shadow: var(--shadow-md);
    line-height: 1.3;
    flex-shrink: 0;
  }

  .preview-timer {
    position: absolute;
    top: 20px;
    right: 20px;
    background: var(--accent);
    color: var(--ink-dark);
    font-weight: 800;
    font-size: 15px;
    padding: 6px 16px;
    border-radius: 40px;
    box-shadow: var(--shadow-sm);
  }
  .preview-step-num {
    position: absolute;
    top: 20px;
    left: 20px;
    background: var(--brand-blue);
    color: var(--bg-white);
    font-weight: 800;
    font-size: 18px;
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow-sm);
  }

  .preview-progress {
    display: flex;
    gap: 6px;
    margin-bottom: 0;
    justify-content: center;
  }
  .preview-progress-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(27, 79, 140, 0.15);
    transition: all 400ms var(--ease);
  }
  .preview-progress-dot.active {
    background: var(--brand-blue);
    width: 28px; border-radius: 4px;
  }
  .preview-progress-dot.done { background: var(--accent); }

  .preview-controls {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 0;
    background: var(--bg-white);
    padding: 0.8vh 1.5vw;
    border-radius: 40px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--brand-blue-soft);
  }
  .preview-control-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--brand-blue-soft);
    color: var(--brand-blue);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 200ms var(--ease);
  }
  .preview-control-btn:hover {
    background: var(--brand-blue);
    color: var(--bg-white);
    transform: rotate(-10deg);
  }
  .preview-control-btn svg { width: 14px; height: 14px; }

  /* ═══════════ 4. EYE SELECTION ═══════════ */
  .eye-select {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 28px;
    width: 100%;
    max-width: 720px;
  }
  .eye-card {
    background: var(--bg-white);
    border: 2px solid var(--brand-blue-soft);
    border-radius: 24px;
    padding: 24px;
    cursor: pointer;
    transition: all 250ms var(--ease-spring);
    box-shadow: var(--shadow-sm);
    text-align: center;
  }
  .eye-card:hover, .eye-card.selected {
    border-color: var(--brand-blue);
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
  }
  .eye-card.selected {
    background: var(--brand-blue-soft);
  }
  .eye-card-img {
    width: 140px;
    height: 140px;
    margin: 0 auto 16px;
    border-radius: 18px;
    overflow: hidden;
    background: var(--brand-blue-soft);
    box-shadow: var(--shadow-sm);
  }
  .eye-card-img img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .eye-card-label {
    font-size: 20px;
    font-weight: 700;
    color: var(--brand-blue);
    margin-bottom: 4px;
  }
  .eye-card-sub {
    font-size: 14px;
    color: var(--ink-mute);
  }

  /* ═══════════ 5. TEST (white) ═══════════ */
  #screen-test { background: #ffffff; overflow: hidden; }
  .test-stage {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    background: #ffffff;
  }

  .stimulus-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .letter-b {
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 400;
    font-size: clamp(220px, 48vw, 360px);
    color: #000;
    line-height: 1;
    position: relative;
    transition: opacity 500ms var(--ease);
    display: inline-block;
  }
  .letter-b.hidden { opacity: 0; }

  .letter-b-glyph {
    position: relative;
    display: inline-block;
    line-height: 0.75;
  }

  .countdown-in-b {
    position: absolute;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 700;
    font-size: clamp(11px, 1.6vw, 8px);
    color: #000;
    line-height: 1;
    pointer-events: none;
    left: 53%;
    top: 64%;
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: opacity 200ms var(--ease);
  }
  .countdown-in-b.show { opacity: 1; }

  /* End-test bar : fixe en bas de page */
  .end-test-bar {
    position: fixed;
    bottom: -120px;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    pointer-events: none;
    transition: bottom 500ms var(--ease-spring), opacity 400ms var(--ease);
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    width: 100%;
    background: linear-gradient(to top, rgba(255,255,255,0.97) 70%, transparent);
    padding-top: 24px;
  }
  .end-test-bar.show {
    bottom: 0;
    opacity: 1;
    pointer-events: auto;
  }
  .end-test-btn {
    background: var(--brand-blue);
    color: #fff;
    border: none;
    padding: clamp(12px, 1.8vh, 18px) clamp(28px, 4vw, 48px);
    border-radius: 40px;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: clamp(15px, 1.8vw, 20px);
    cursor: pointer;
    box-shadow: 0 8px 32px rgba(27, 79, 140, 0.35);
    transition: all 200ms var(--ease);
    display: inline-flex;
    align-items: center;
    gap: 10px;
    white-space: nowrap;
  }
  .end-test-btn:hover {
    background: var(--brand-blue-light);
    transform: translateY(-2px);
    box-shadow: 0 12px 36px rgba(27, 79, 140, 0.45);
  }
  .end-test-btn:active { transform: translateY(0); }
  .end-test-hint {
    font-size: clamp(11px, 1.2vw, 13px);
    color: var(--ink-mute);
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 90vw;
    line-height: 1.3;
  }


  .abort-btn {
    position: absolute;
    top: 24px; right: 24px;
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 2px solid var(--ink-soft);
    background: #fff;
    color: var(--ink-soft);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 20;
    transition: all 200ms var(--ease);
  }
  .abort-btn:hover {
    background: var(--ink-dark);
    color: #fff;
    border-color: var(--ink-dark);
    transform: rotate(90deg);
  }

  /* ═══════════ 6. RESULT ═══════════ */
  .result-card {
    overflow-y: auto;
    background: var(--bg-white);
    border-radius: 24px;
    padding: clamp(16px, 3vh, 32px) clamp(16px, 3vw, 40px);
    max-width: 540px;
    width: 100%;
    margin: 0 auto;
    box-shadow: var(--shadow-lg);
    text-align: center;
  }
  .result-logo {
    height: clamp(36px, 6vh, 56px);
    margin: 0 auto clamp(8px, 1.5vh, 16px);
    display: block;
  }
  .result-title {
    font-size: clamp(18px, 2.8vw, 28px);
    font-weight: 800;
    color: var(--brand-blue);
    margin-bottom: 12px;
  }
  .result-actions {
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
  }
  .result-actions .btn { width: 100%; justify-content: center; }
  #resultActions {
    flex-direction: column;
    gap: 8px;
    margin-top: clamp(8px, 1.5vh, 16px);
    display: none;
  }
  .result-subtext {
    color: var(--ink-soft);
    font-size: clamp(13px, 1.3vw, 15px);
    line-height: 1.5;
    margin-bottom: 6px;
  }
  /* ═══════════ SITUATION CARDS (question screen) ═══════════ */

  /* Stack vertical : A au-dessus, B en dessous */
  .situation-stack {
    display: flex;
    flex-direction: column;
    gap: clamp(6px, 1vh, 14px);
    width: 100%;
    flex: 1;
    min-height: 0;
  }

  .situation-card {
    background: var(--bg-white);
    border: 2.5px solid var(--brand-blue-soft);
    border-radius: 20px;
    padding: clamp(8px,1.2vh,14px) clamp(10px,1.5vw,20px);
    cursor: pointer;
    transition: all 250ms var(--ease-spring);
    box-shadow: var(--shadow-sm);
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(6px,0.8vh,10px);
    width: 100%;
    box-sizing: border-box;
  }
  .situation-card:hover, .situation-card.selected {
    border-color: var(--brand-blue);
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
  }
  .situation-card.selected { background: var(--brand-blue-soft); }

  .situation-label {
    font-weight: 800;
    font-size: clamp(12px, 1.4vw, 17px);
    color: var(--brand-blue);
  }

  /* Ligne principale : gauche | centre | droit */
  .sit-row {
    display: flex;
    align-items: flex-start;
    gap: clamp(16px, 3vw, 40px);
    justify-content: center;
    width: 100%;
  }

  /* Variante 3 colonnes (avec fille au centre) — CSS Grid pour alignement parfait */
  .sit-row--three {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: clamp(10px, 2vw, 28px);
    align-items: flex-start;
    width: 100%;
  }

  /* Fille : centrée verticalement */
  .sit-row--three .sit-girl-col {
    align-self: center;
    justify-self: center;
  }

  /* Colonnes œil : centrées dans leur cellule grid */
  .sit-row--three .sit-eye-col,
  .sit-row--three .sit-eye-col--multi,
  .sit-row--three .sit-eye-col--right-b {
    justify-self: center;
  }

  /* Colonne œil (simple ou multi) */
  .sit-eye-col, .sit-eye-col--multi {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    flex: 0 0 auto;
  }

  /* Colonne fille centrale */
  .sit-girl-col {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .sit-girl-img {
    height: clamp(60px, 12vw, 120px);
    width: auto;
    display: block;
    object-fit: contain;
  }

  /* Colonne verticale pour les images Œil Droit Situation B */
  .sit-multi-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(2px, 0.4vw, 5px);
  }
  .sit-or-label {
    font-size: clamp(9px, 0.85vw, 11px);
    font-weight: 700;
    color: var(--ink-mute);
    letter-spacing: .05em;
    text-align: center;
    line-height: 1;
  }

  .sit-eye-label {
    font-size: clamp(9px, 0.9vw, 12px);
    font-weight: 600;
    color: var(--ink-mute);
    white-space: nowrap;
    letter-spacing: .03em;
    text-align: center;
  }

  /* Taille unique pour toutes les images des situations */
  .sit-img-main {
    width: clamp(50px, 8vw, 100px);
    height: clamp(50px, 8vw, 100px);
  }

  .situation-img-wrap {
    border-radius: 8px;
    overflow: hidden;
    background: #000;
    flex-shrink: 0;
  }
  .situation-img-wrap img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
  }

  /* Ligne des 4 images côté droit Situation B */
  .sit-multi-row {
    display: flex;
    align-items: center;
    gap: clamp(4px, 0.6vw, 8px);
    flex-wrap: nowrap;
  }

  .situation-or {
    font-size: clamp(9px, 0.9vw, 11px);
    font-weight: 700;
    color: var(--ink-mute);
    letter-spacing: .05em;
    flex-shrink: 0;
    white-space: nowrap;
  }

  /* "Autre chose" — même taille que les autres images, fond noir texte blanc */
  .situation-autre {
    border-radius: 8px;
    background: #000000;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(12px, 1.3vw, 16px);
    font-weight: 700;
    color: #ffffff;
    text-align: center;
    padding: 4px;
    box-sizing: border-box;
    flex-shrink: 0;
    line-height: 1.25;
  }

  /* ═══════════ COLUMN HEADER LABELS (question screen) ═══════════ */
  /* Outer wrapper — same 3-col flex as sit-row--three */
  /* Headers colonnes : même grid que sit-row--three pour alignement parfait */
  .sit-col-headers {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: clamp(10px, 2vw, 28px);
    width: 100%;
    margin-top: clamp(16px, 3vh, 36px);
    padding: 0 0 clamp(3px,0.5vh,6px) 0;
    pointer-events: none;
  }
  .sit-col-header {
    font-size: clamp(14px, 1.5vw, 20px);
    font-weight: 700;
    color: var(--brand-blue);
    text-align: center;
    font-style: italic;
    line-height: 1.2;
    white-space: nowrap;
  }
  /* Spacer : même taille que la colonne fille (sit-girl-img) */
  .sit-col-header--spacer {
    visibility: hidden;
    width: clamp(60px, 12vw, 120px);
    justify-self: center;
  }
  #colHeaderRight { justify-self: center; }
  #colHeaderLeft  { justify-self: center; }

  /* b correct Situation B : label en haut, image centrée verticalement */
  .sit-eye-col--right-b {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 0 0 auto;
    gap: 0;
    align-self: stretch; /* stretch to full height of the sit-row */
  }
  .sit-eye-col--right-b .sit-eye-label {
    margin-bottom: 6px;
    flex-shrink: 0;
  }
  .sit-eye-col--right-b .sit-b-img-center {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ═══════════ SEND FORM (result screen) ═══════════ */
  .send-form {
    margin-top: clamp(10px, 1.8vh, 20px);
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .send-form .field-label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--ink-mute);
    text-transform: uppercase;
    letter-spacing: .07em;
    margin-bottom: 5px;
  }
  .send-form .field-input {
    width: 100%;
    padding: 11px 14px;
    border: 2px solid var(--brand-blue-soft);
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    color: var(--ink-dark);
    outline: none;
    transition: border-color 200ms;
    box-sizing: border-box;
  }
  .send-form .field-input:focus { border-color: var(--brand-blue); }
  .send-form .field-input.error { border-color: var(--warning); }

  .btn-send {
    background: var(--brand-blue);
    color: #fff;
    border: none;
    padding: 14px 28px;
    border-radius: 40px;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    transition: all 200ms var(--ease);
    width: 100%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 4px;
    box-shadow: 0 4px 20px rgba(27,79,140,0.25);
  }
  .btn-send:hover:not(:disabled) {
    background: var(--brand-blue-light);
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(27,79,140,0.35);
  }
  .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-send.sending { opacity: 0.7; }

  .send-success {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 20px 0 8px;
    text-align: center;
  }
  .send-success.show { display: flex; }
  .send-success-icon {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--success);
    display: flex; align-items: center; justify-content: center;
    color: #fff;
  }
  .send-success-title {
    font-size: 18px;
    font-weight: 800;
    color: var(--brand-blue);
  }
  .send-success-text {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.5;
    max-width: 320px;
  }
  .send-error-msg {
    font-size: 13px;
    color: var(--warning);
    display: none;
    margin-top: -4px;
  }
  .send-error-msg.show { display: block; }

  /* ═══════════ ANIMATIONS ═══════════ */
  .screen.active .anim-in { animation: slideUp 600ms var(--ease-out) both; }
  .screen.active .anim-in:nth-child(1) { animation-delay: 0ms; }
  .screen.active .anim-in:nth-child(2) { animation-delay: 70ms; }
  .screen.active .anim-in:nth-child(3) { animation-delay: 140ms; }
  .screen.active .anim-in:nth-child(4) { animation-delay: 210ms; }
  .screen.active .anim-in:nth-child(5) { animation-delay: 280ms; }
  .screen.active .anim-in:nth-child(6) { animation-delay: 350ms; }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ═══════════ RESPONSIVE ═══════════ */
  @media (max-width: 768px) {
    /* Container : scroll vertical, pas de coupure */
    .container {
      justify-content: flex-start;
      padding: 16px 20px 32px;
      gap: 16px;
    }
    /* Top bar */
    .top-bar { padding: 12px 16px; }
    .brand-logo { height: 28px; }
    .lang-btn { padding: 5px 10px; font-size: 11px; }
    .audio-toggle { width: 36px; height: 36px; }
    /* Typography */
    h1 { font-size: clamp(18px, 5vw, 26px); }
    h2 { font-size: clamp(16px, 4.5vw, 22px); }
    p.lead { font-size: clamp(13px, 3.5vw, 16px); max-width: 90vw; }
    /* Buttons */
    .btn { font-size: clamp(13px, 3.5vw, 15px); padding: 12px 20px; }
    /* Welcome */
    .welcome-hero { border-radius: 16px; min-height: clamp(100px, 25vw, 250px); }
    .prereqs { grid-template-columns: repeat(2, 1fr); max-width: 100%; }
    .prereq-icon { font-size: clamp(18px, 5vw, 24px); }
    .prereq-title { font-size: clamp(11px, 3vw, 14px); }
    .prereq-sub { font-size: clamp(10px, 2.5vw, 12px); }
    /* Guidelines */
    .guidelines-layout { grid-template-columns: 1fr; min-height: auto; }
    .guidelines-hero { border-radius: 16px; max-height: 35vw; min-height: 120px; }
    .guidelines-list { gap: 8px; }
    .guidelines-list li { font-size: clamp(12px, 3.2vw, 14px); padding: 10px 12px 10px 38px; }
    .guidelines-list li::before { left: 10px; top: 10px; width: 20px; height: 20px; font-size: 11px; }
    /* Preview */
    .preview-stage { max-width: 100%; min-height: clamp(160px, 45vw, 320px); }
    .preview-img { width: clamp(140px, 50%, 260px); height: clamp(140px, 50%, 260px); }
    .preview-caption { font-size: clamp(12px, 3vw, 14px); }
    /* Eye selection */
    .eye-select { grid-template-columns: 1fr; max-width: 380px; }
    .eye-card { padding: 16px; }
    .eye-card-img { width: 80px; height: 80px; }
    .eye-card-label { font-size: 16px; }
    /* Test */
    .letter-b { font-size: clamp(160px, 45vw, 280px); }
    .end-test-btn { font-size: clamp(14px, 4vw, 18px); }
    /* Result & Question */
    .result-card { max-width: 92vw; padding: 20px 16px; }
    .result-logo { height: clamp(28px, 8vw, 44px); }
    .result-title { font-size: clamp(16px, 5vw, 22px); }
    .result-subtext { font-size: clamp(12px, 3.5vw, 14px); }
    .sit-img-main { width: clamp(50px, 14vw, 80px); height: clamp(50px, 14vw, 80px); }
    .sit-girl-img { height: clamp(60px, 18vw, 100px); }
    .sit-col-header { font-size: clamp(10px, 3vw, 13px); white-space: normal; }
    .situation-label { font-size: clamp(12px, 3.5vw, 15px); }
    /* Misc */
    .audio-toast { right: 16px; top: 66px; }
  }
</style>
</head>
<body>

<div id="app">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="brand-logo">
      <img class="brand-logo-img" id="brandLogo" alt="Lexilens by Abeye">
    </div>
    <div class="top-controls top-bar-hide-on-test">
      <div class="lang-switch">
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="fr">FR</button>
      </div>
      <button class="audio-toggle" id="audioBtn" aria-label="Toggle voice">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 5 6 9H2v6h4l5 4V5z"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="audio-toast" id="audioToast"></div>

  <div id="screens-wrap">

  <!-- ═══════════ 1. WELCOME ═══════════ -->
  <section class="screen active" id="screen-welcome">
    <div class="container">
      <div class="anim-in" style="text-align:center;">
        <h1 data-i18n="welcomeTitle"></h1>
        <p class="lead" data-i18n="welcomeLead" style="margin:0 auto;"></p>
      </div>
      <div class="welcome-hero anim-in">
        <img id="welcomeImg" alt="Welcome to the internal crowding test">
      </div>

      <div class="prereqs anim-in">
        <div class="prereq">
          <div class="prereq-icon">👓</div>
          <div class="prereq-title" data-i18n="prereqGlasses"></div>
          <div class="prereq-sub" data-i18n="prereqGlassesSub"></div>
        </div>
        <div class="prereq">
          <div class="prereq-icon">🤫</div>
          <div class="prereq-title" data-i18n="prereqCalm"></div>
          <div class="prereq-sub" data-i18n="prereqCalmSub"></div>
        </div>
        <div class="prereq">
          <div class="prereq-icon">☀️</div>
          <div class="prereq-title" data-i18n="prereqBright"></div>
          <div class="prereq-sub" data-i18n="prereqBrightSub"></div>
        </div>
        <div class="prereq">
          <div class="prereq-icon">🌙</div>
          <div class="prereq-title" data-i18n="prereqDim"></div>
          <div class="prereq-sub" data-i18n="prereqDimSub"></div>
        </div>
      </div>

      <div class="btn-row anim-in">
        <button class="btn btn-primary" onclick="goTo('guidelines')">
          <span data-i18n="btnContinue"></span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>
  </section>

  <!-- ═══════════ 2. GUIDELINES ═══════════ -->
  <section class="screen" id="screen-guidelines">
    <div class="container">
      <div class="anim-in" style="text-align:center;">
        <div class="eyebrow" data-i18n="guidelinesEyebrow"></div>
        <h1 data-i18n="guidelinesTitle"></h1>
      </div>
      <div class="guidelines-layout anim-in">
        <div class="guidelines-hero">
          <img id="guidelinesImg" alt="Guidelines">
        </div>
        <ul class="guidelines-list">
        <li data-i18n="g1"></li>
        <li data-i18n="g2"></li>
        <li data-i18n="g3"></li>
        <li data-i18n="g4"></li>
        <li data-i18n="g5"></li>
        <li data-i18n="g6"></li>
      </ul>
      </div>

      <div class="btn-row anim-in">
        <button class="btn btn-ghost" onclick="goTo('welcome')" data-i18n="btnBack"></button>
        <button class="btn btn-primary" onclick="goTo('preview')">
          <span data-i18n="btnLearnSteps"></span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>
  </section>

  <!-- ═══════════ 3. EYE SELECTION (before preview, so preview is contextual) ═══════════ -->
  <section class="screen" id="screen-eye">
    <div class="container">
      <div class="anim-in">
        <div class="eyebrow" data-i18n="eyeEyebrow"></div>
        <h1 data-i18n="eyeTitle"></h1>
        <p class="lead" data-i18n="eyeLead"></p>
      </div>

      <div class="eye-select anim-in">
        <button class="eye-card" onclick="selectTestedEye('left', event)">
          <div class="eye-card-img"><img id="eyeLeftImg" alt=""></div>
          <div class="eye-card-label" data-i18n="testedLeft"></div>
          <div class="eye-card-sub" data-i18n="testedLeftSub"></div>
        </button>
        <button class="eye-card" onclick="selectTestedEye('right', event)">
          <div class="eye-card-img"><img id="eyeRightImg" alt=""></div>
          <div class="eye-card-label" data-i18n="testedRight"></div>
          <div class="eye-card-sub" data-i18n="testedRightSub"></div>
        </button>
      </div>

      <div class="btn-row anim-in">
        <button class="btn btn-ghost" onclick="goTo('guidelines')" data-i18n="btnBack"></button>
      </div>
    </div>
  </section>

  <!-- ═══════════ 4. PREVIEW (sequence learning, depends on selected eye) ═══════════ -->
  <section class="screen" id="screen-preview">
    <div class="container">
      <div class="anim-in">
        <div class="eyebrow" data-i18n="previewEyebrow"></div>
        <h1 data-i18n="previewTitle"></h1>
        <p class="lead" data-i18n="previewLead" id="previewLeadEl" style="text-align:center; margin:0 auto;"></p>
      </div>

      <div class="preview-progress anim-in" id="previewProgress"></div>

      <div class="preview-stage anim-in">
        <!-- Dynamic content -->
      </div>

      <div class="preview-controls anim-in">
        <button class="preview-control-btn" id="prevReplay" aria-label="Replay">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
        <span style="font-size: 13px; color: var(--ink-mute); font-weight: 600;" data-i18n="replayLabel"></span>
      </div>

      <div class="btn-row anim-in">
        <button class="btn btn-ghost" onclick="goTo('guidelines')" data-i18n="btnBack"></button>
        <button class="btn btn-accent" onclick="goTo('test')" data-i18n="btnStartTest"></button>
      </div>
    </div>
  </section>

  <!-- ═══════════ 5. TEST ═══════════ -->
  <section class="screen" id="screen-test">
    <button class="abort-btn" onclick="abortTest()" aria-label="Cancel">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>

    <!-- End-test bar (appears after 15s + small delay) -->
    <div class="end-test-bar" id="endTestBar">
      <button class="end-test-btn" onclick="finishTest()">
        <span data-i18n="btnEndTest"></span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg>
      </button>
      <div class="end-test-hint" data-i18n="endTestHint"></div>
    </div>

    <div class="test-stage">
      <div class="stimulus-wrap">

/* ═══════════════════════════════════════════════════
   AUDIO — robust implementation
═══════════════════════════════════════════════════ */
let audioCtx = null;
let voices = [];

function initAudioContext() {
  if (audioCtx) return audioCtx;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch (e) {}
  return audioCtx;
}

let audioUnlocked = false;
function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  initAudioContext();
  if ('speechSynthesis' in window) {
    try {
      const u = new SpeechSynthesisUtterance('');
      u.volume = 0;
      window.speechSynthesis.speak(u);
    } catch (e) {}
  }
}
document.addEventListener('click', unlockAudio, { capture: true });
document.addEventListener('touchstart', unlockAudio, { capture: true });

function loadVoices() {
  if (!('speechSynthesis' in window)) return;
  voices = window.speechSynthesis.getVoices();
  if (voices.length > 0) pickVoice();
}

function pickVoice() {
  if (!voices.length) return;
  const prefix = state.lang === 'fr' ? 'fr' : 'en';
  let voice = voices.find(v => v.lang.toLowerCase().startsWith(prefix) && v.name.includes('Google'));
  if (!voice) voice = voices.find(v => v.lang.toLowerCase().startsWith(prefix + '-'));
  if (!voice) voice = voices.find(v => v.lang.toLowerCase().startsWith(prefix));
  state.selectedVoice = voice;
  state.voiceAvailable = !!voice;
}

if ('speechSynthesis' in window) {
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
  setTimeout(loadVoices, 100);
  setTimeout(loadVoices, 500);
}

   Base URL des MP3 (GitHub Pages) :
═══════════════════════════════════════════════════ */
const AUDIO_BASE = './audio/';

// Mapping step → fichier MP3 (step01..step10, fr/en)
const AUDIO_STEPS = {
  fr: [
    'step01_fr.mp3', // pos1  : Installez-vous confortablement…
    'step02_fr.mp3', // pos5  : Fermez votre œil droit…
    'step03_fr.mp3', // pos4  : En gardant votre œil droit fermé… (preview)
    'step04_fr.mp3',
    'step05_fr.mp3',
    'step06_fr.mp3',
    'step07_fr.mp3',
    'step08_fr.mp3',
    'step09_fr.mp3',
    'step10_fr.mp3',
    'step03bis_fr.mp3', // index 10 : même texte que step03 mais pour le test réel
  ],
  en: [
    'step01_en.mp3',
    'step02_en.mp3',
    'step03_en.mp3', // preview
    'step04_en.mp3',
    'step05_en.mp3',
    'step06_en.mp3',
    'step07_en.mp3',
    'step08_en.mp3',
    'step09_en.mp3',
    'step10_en.mp3',
    'step03bis_en.mp3', // index 10 : test réel
  ]
};

let currentAudio = null; // HTMLAudioElement en cours

function stopAudio() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    currentAudio = null;
  }
  window.speechSynthesis && window.speechSynthesis.cancel();
  document.getElementById('audioBtn').classList.remove('speaking');
}

// Joue un MP3 par index (0-based) — sans attendre la fin (pour preview)
function playStepAudio(stepIndex) {
  if (!state.audioEnabled) return;
  stopAudio();
  const file = AUDIO_STEPS[state.lang]?.[stepIndex];
  if (!file) return;
  const audio = new Audio(AUDIO_BASE + file);
  currentAudio = audio;
  audio.onplay  = () => document.getElementById('audioBtn').classList.add('speaking');
  audio.onended = () => { document.getElementById('audioBtn').classList.remove('speaking'); currentAudio = null; };
  audio.onerror = () => { document.getElementById('audioBtn').classList.remove('speaking'); currentAudio = null; };
  audio.play().catch(() => {});
}

// Joue un MP3 par index et retourne une Promise résolue à la fin (pour le test)
function playStepAudioAndWait(stepIndex) {
  return new Promise(resolve => {
    if (!state.audioEnabled) { resolve(); return; }
    const file = AUDIO_STEPS[state.lang]?.[stepIndex];
    if (!file) { resolve(); return; }
    stopAudio();
    const audio = new Audio(AUDIO_BASE + file);
    currentAudio = audio;
    audio.onplay  = () => document.getElementById('audioBtn').classList.add('speaking');
    audio.onended = () => {
      document.getElementById('audioBtn').classList.remove('speaking');
      currentAudio = null;
      resolve();
    };
    audio.onerror = () => {
      // Fallback synthèse si MP3 absent
      document.getElementById('audioBtn').classList.remove('speaking');
      currentAudio = null;
      const texts = T().audioSteps;
      if (texts?.[stepIndex]) speakAndWaitSynth(texts[stepIndex]).then(resolve);
      else resolve();
    };
    audio.play().catch(() => { resolve(); });
  });
}

// Fallback : synthèse vocale (gardé pour compatibilité)
function speakAndWaitSynth(text, rate = 1.1) {
  return new Promise(resolve => {
    if (!('speechSynthesis' in window)) { resolve(); return; }
    try {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = state.lang === 'fr' ? 'fr-FR' : 'en-US';
      if (state.selectedVoice) { u.voice = state.selectedVoice; u.lang = state.selectedVoice.lang; }
      u.rate = rate; u.pitch = 1; u.volume = 1;
      u.onstart = () => document.getElementById('audioBtn').classList.add('speaking');
      u.onend   = () => { document.getElementById('audioBtn').classList.remove('speaking'); resolve(); };
      u.onerror = () => { document.getElementById('audioBtn').classList.remove('speaking'); resolve(); };
      window.speechSynthesis.speak(u);
    } catch(e) { resolve(); }
  });
}

// Alias legacy pour la preview (utilise synthèse — sera remplacé par playStepAudio)
function speak(text, rate = 0.92) {
  if (!state.audioEnabled) return;
  if (!('speechSynthesis' in window)) return;
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    if (state.selectedVoice) { u.voice = state.selectedVoice; u.lang = state.selectedVoice.lang; }
    else { u.lang = state.lang === 'fr' ? 'fr-FR' : 'en-US'; }
    u.rate = rate; u.pitch = 1; u.volume = 1;
    u.onstart = () => document.getElementById('audioBtn').classList.add('speaking');
    u.onend   = () => document.getElementById('audioBtn').classList.remove('speaking');
    u.onerror = () => document.getElementById('audioBtn').classList.remove('speaking');
    window.speechSynthesis.speak(u);
  } catch(e) {}
}

function speakAndWait(text, rate = 1.1) {
  return speakAndWaitSynth(text, rate);
}

function ding(freq = 660, duration = 0.25) {
  const ctx = initAudioContext();
  if (!ctx) return;
  if (ctx.state === 'suspended') ctx.resume().then(() => playTone(ctx, freq, duration));
  else playTone(ctx, freq, duration);
}
function playTone(ctx, freq, duration) {
  try {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine';
    o.frequency.value = freq;
    g.gain.setValueAtTime(0, ctx.currentTime);
    g.gain.linearRampToValueAtTime(0.2, ctx.currentTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + duration + 0.05);
  } catch (e) {}
}

const audioToast = document.getElementById('audioToast');
let toastTimer;
function showToast(msg, isErr = false, dur = 2500) {
  audioToast.textContent = msg;
  audioToast.classList.toggle('error', isErr);

  clearTimeout(toastTimer);

}

    }
  } else {
    window.speechSynthesis && window.speechSynthesis.cancel();
    audioBtn.classList.remove('speaking');
    showToast(T().audioOff);
  }
});

   PREVIEW SEQUENCE
═══════════════════════════════════════════════════ */
// Image mapping based on tested eye (PDF official sequence)
// LEFT eye tested:
//  1. pos1 - both eyes open
//  2. pos2 - left eye covered with left hand, right eye fixates b (15s)
//  3. pos4 - both hands on both eyes, eyes closed
//  4. pos3 - left hand stays / right hand removed, right eye closed (2s)
//  5. pos4 - both hands back on both eyes
//  6. pos3 - same as 4, this is the reveal moment (2s)

// RIGHT eye tested:
//  1. pos1 - both eyes open
//  2. pos5 - right eye covered with right hand, left eye fixates b (15s)
//  3. pos4 - both hands on both eyes
//  4. pos6 - right hand stays / left hand removed, left eye closed (2s)
//  5. pos4 - both hands back
//  6. pos6 - reveal (2s)

// ═══════════════════════════════════════════════════
// PREVIEW STEPS — 10 étapes (séquence officielle PDF étendue)
// Étapes 1-2 : setup et fixation (affichées mais non répétées en boucle)
// Étapes 3-10 : séquence yeux fermés (répétée à chaque boucle)
// ═══════════════════════════════════════════════════

function getPreviewSteps() {
  const isLeft = state.testedEye === 'left';
  const prefix = isLeft ? 'prevLeft' : 'prevRight';

  // Mapping anatomique CORRIGÉ :
  // L'œil TESTÉ est celui qui fixe le b (il reste OUVERT au départ).
  // La main qui couvre est du côté OPPOSÉ à l'œil testé.
  //
  // TEST ŒIL GAUCHE (isLeft = true) — l'œil gauche fixe le b :
  //   étape 2 : pos5 (main DROITE sur œil DROIT, œil GAUCHE ouvert qui fixe le b)
  //   étapes 3+ : yeux fermés, 2 mains
  //   "retire main droite" (côté couvert initialement) : pos3
  //     → main gauche sur œil gauche, œil droit fermé sans main = pos3
  //   "retire main gauche" (côté testé) : pos6
  //     → main droite sur œil droit, œil gauche fermé sans main = pos6
  //
  // TEST ŒIL DROIT (isLeft = false) — l'œil droit fixe le b :
  //   étape 2 : pos2 (main GAUCHE sur œil GAUCHE, œil DROIT ouvert qui fixe le b)
  //   "retire main gauche" (côté couvert initialement) : pos6
  //     → main droite sur œil droit, œil gauche fermé sans main = pos6
  //   "retire main droite" (côté testé) : pos3
  //     → main gauche sur œil gauche, œil droit fermé sans main = pos3

  const imgFixation  = isLeft ? IMG.pos5 : IMG.pos2; // pos5 = œil gauche testé / pos2 = œil droit testé
  const imgBothHands    = IMG.pos4;

  // ŒIL GAUCHE : étapes 4/8 = retire main gauche → pos6 / étapes 6/10 = retire main droite → pos3
  // ŒIL DROIT  : étapes 4/8 = retire main droite → pos3 / étapes 6/10 = retire main gauche → pos6
  const imgStep4and8  = isLeft ? IMG.pos6 : IMG.pos3;
  const imgStep6and10 = isLeft ? IMG.pos3 : IMG.pos6;

  // Durées plus longues en FR (textes plus longs), adaptatives selon la langue
  const isFr = state.lang === 'fr';
  const d = {
    intro:   isFr ? 6000  : 5000,
    fixate:  isFr ? 8500  : 7000,
    both:    isFr ? 9000  : 7000,  // étape 3 : texte long
    observe: isFr ? 8000  : 6500,  // étapes "retirer + observer"
    replace: isFr ? 6500  : 5500,  // étapes "replacer"
  };

  return [
    { img: IMG.pos1,         captionKey: prefix + '1',  timer: null,  num: 1,  dur: d.intro   },
    { img: imgFixation,      captionKey: prefix + '2',  timer: '15s', num: 2,  dur: d.fixate  },
    { img: imgBothHands,     captionKey: prefix + '3',  timer: null,  num: 3,  dur: d.both    },
    { img: imgStep4and8,  captionKey: prefix + '4',  timer: '3s',  num: 4,  dur: d.observe },
    { img: imgBothHands,     captionKey: prefix + '5',  timer: null,  num: 5,  dur: d.replace },
    { img: imgStep6and10, captionKey: prefix + '6',  timer: '3s',  num: 6,  dur: d.observe },
    { img: imgBothHands,     captionKey: prefix + '7',  timer: null,  num: 7,  dur: d.replace },
    { img: imgStep4and8,  captionKey: prefix + '8',  timer: '3s',  num: 8,  dur: d.observe },
    { img: imgBothHands,     captionKey: prefix + '9',  timer: null,  num: 9,  dur: d.replace },
    { img: imgStep6and10, captionKey: prefix + '10', timer: '3s',  num: 10, dur: d.observe }
  ];
}

function buildPreviewSteps() {
  const stage = document.querySelector('#screen-preview .preview-stage');
  const progress = document.getElementById('previewProgress');
  const steps = getPreviewSteps();

  stage.innerHTML = steps.map((s, i) => `
    <div class="preview-step" data-step="${i}">
      <div class="preview-step-num">${s.num}</div>
      ${s.timer ? `<div class="preview-timer">${s.timer}</div>` : ''}
      <div class="preview-img"><img src="${s.img}" alt=""></div>
      <div class="preview-caption">${T()[s.captionKey]}</div>
    </div>
  `).join('');

  progress.innerHTML = steps.map(() => '<div class="preview-progress-dot"></div>').join('');
}

document.getElementById('prevReplay').addEventListener('click', () => {
  stopPreview();
  startPreview();
});

function showPreviewStep(idx) {
  const stepsEls = document.querySelectorAll('#screen-preview .preview-step');
  const dots = document.querySelectorAll('#previewProgress .preview-progress-dot');
  stepsEls.forEach((el, i) => el.classList.toggle('show', i === idx));
  dots.forEach((dot, i) => {
    dot.classList.remove('active', 'done');
    if (i < idx) dot.classList.add('done');
    if (i === idx) dot.classList.add('active');
  });
}

async function startPreview() {
  if (state.previewRunning) return;
  state.previewRunning = true;
  const steps = getPreviewSteps();
  let loopCount = 0;
  while (state.previewRunning) {
    for (let i = 0; i < steps.length; i++) {
      if (!state.previewRunning) return;
      showPreviewStep(i);
      // Boucle 1 : lire toutes les étapes
      // Boucles suivantes : relire uniquement étapes 3 à 10 (index >= 2)
      if (loopCount === 0 || i >= 2) {
        playStepAudio(i); // MP3 ElevenLabs, fallback synthèse
      }
      await new Promise(res => {
        state.previewTimer = setTimeout(res, steps[i].dur);
      });
    }
    loopCount++;
    await new Promise(res => { state.previewTimer = setTimeout(res, 800); });
  }
}

function stopPreview() {
  state.previewRunning = false;
  if (state.previewTimer) clearTimeout(state.previewTimer);
  window.speechSynthesis && window.speechSynthesis.cancel();
}

function selectTestedEye(eye, evt) {
  state.testedEye = eye;
  document.querySelectorAll('.eye-card').forEach(c => c.classList.remove('selected'));
  if (evt && evt.currentTarget) evt.currentTarget.classList.add('selected');
  ding(880, 0.15);
  setTimeout(() => goTo('preview'), 400);
}

/* ═══════════════════════════════════════════════════
   TEST FLOW
   - Show "b" with countdown inside the loop (15s)
   - When user has fixated for 15s, the letter b is hidden
   - User then closes their eyes and does the hand alternation
     (the app does NOT guide this — user learned the sequence in preview)
   - After ~5 seconds, a discrete "End test" button appears
     (giving the user enough time to start the alternation)
   - User presses "End test" when done → goes to result
═══════════════════════════════════════════════════ */
const letterB = document.getElementById('letterB');
const countdownInB = document.getElementById('countdownInB');
const endTestBar = document.getElementById('endTestBar');

function showLetter() { letterB.classList.remove('hidden'); }
function hideLetter() { letterB.classList.add('hidden'); }
function showCountInB(n) { countdownInB.textContent = n; countdownInB.classList.add('show'); }
function hideCountInB() { countdownInB.classList.remove('show'); countdownInB.textContent = ''; }
function setProgress(pct) { /* progress bar removed */ }

async function countdownFrom(seconds) {
  for (let i = seconds; i >= 1; i--) {
    showCountInB(i);
    setProgress(((seconds - i + 1) / seconds) * 100);
    await wait(1000);
    if (!state.testRunning) return;
  }
  hideCountInB();
}

async function startTest() {
  state.testRunning = true;
  state.endTestArmed = false;
  setProgress(0);
  hideLetter();
  hideCountInB();
  endTestBar.classList.remove('show');

  await wait(600);
  if (!state.testRunning) return;

  // Afficher le b + voix step02 (Fermez votre œil droit...)
  showLetter();
  await wait(400);
  // Lancer step02 et attendre la fin avant de démarrer le countdown
  await playStepAudioAndWait(1);
  if (!state.testRunning) return;

  // 15 secondes de fixation (démarrent après la fin de la voix step02)
  await countdownFrom(15);
  if (!state.testRunning) return;

  // ─── Le b reste affiché — on joue step03bis pendant que l'utilisateur voit encore le b ───
  await playStepAudioAndWait(10); // index 10 = step03bis
  if (!state.testRunning) return;

  // Le b reste affiché pendant toute la suite (ne pas appeler hideLetter ici)

  // ─── Afficher le bouton "Test terminé" après 7s (en parallèle) ───
  wait(7000).then(() => {
    if (!state.testRunning) return;
    state.endTestArmed = true;
    endTestBar.classList.add('show');
    // Le b reste affiché même quand endTestBar apparaît
  });

  // ─── VOIX OFF des étapes 4 à 10 (index 3 à 9) ───
  // Après step04, 06, 08, 10 (index 3, 5, 7, 9) : attendre 2 secondes supplémentaires
  const stepsWithDelay = new Set([3, 5, 7, 9]); // step04, step06, step08, step10
  for (let i = 3; i <= 9; i++) {
    if (!state.testRunning) return;
    await playStepAudioAndWait(i); // step04 → step10
    if (stepsWithDelay.has(i)) {
      await wait(2000); // 2 secondes de pause après step04, 06, 08, 10
    }
    if (!state.testRunning) return;
  }
}

function finishTest() {
  state.testRunning = false;
  if (state.testTimer) clearTimeout(state.testTimer);
  endTestBar.classList.remove('show');
  stopAudio();
  showQuestionScreen();
}

function abortTest() {
  state.testRunning = false;
  if (state.testTimer) clearTimeout(state.testTimer);
  stopAudio();
  endTestBar.classList.remove('show');
  goTo('welcome');
}

/* ═══════════════════════════════════════════════════

═══════════════════════════════════════════════════ */
// Récupère l'IP publique côté navigateur, la géolocalisation est faite par Apps Script
let _ipCache = null;
async function getPublicIP() {
  if (_ipCache) return _ipCache;
  const apis = [
    () => fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => d.ip),
    () => fetch('https://api64.ipify.org?format=json').then(r => r.json()).then(d => d.ip),
    () => fetch('https://api.my-ip.io/v1/ip.json').then(r => r.json()).then(d => d.ip),
  ];
  for (const api of apis) {
    try {
      const ip = await Promise.race([
        api(),
        new Promise((_, rej) => setTimeout(() => rej('timeout'), 5000))
      ]);
      if (ip) { _ipCache = ip; return _ipCache; }
    } catch(e) { /* essai suivant */ }
  }
  _ipCache = 'N/A';
  return _ipCache;
}

   ENVOI GOOGLE SHEETS
═══════════════════════════════════════════════════ */
// ⬇ Remplacer par l'URL de votre Apps Script déployé
const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/AKfycbxRXVdYX832spEJP7aHg_bxbF7xUwERbLn7q4XgEGjfDKJpOPN48XSD3QIZoAY6uwlm1Q/exec';

async function submitForm() {
  const t = T();
  const prenom = document.getElementById('sendPrenom').value.trim();
  const email  = document.getElementById('sendEmail').value.trim();
  const errEl  = document.getElementById('sendErrorMsg');

  errEl.classList.remove('show');
  document.getElementById('sendPrenom').classList.remove('error');
  document.getElementById('sendEmail').classList.remove('error');

  // Validation
  if (!prenom || !email) {
    errEl.textContent = t.errorRequired;
    errEl.classList.add('show');
    if (!prenom) document.getElementById('sendPrenom').classList.add('error');
    if (!email)  document.getElementById('sendEmail').classList.add('error');
    return;
  }
  const emailReg = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailReg.test(email)) {
    errEl.textContent = t.errorEmail;
    errEl.classList.add('show');
    document.getElementById('sendEmail').classList.add('error');
    return;
  }

  // Envoi
  const btn = document.getElementById('btnSend');
  btn.disabled = true;
  btn.classList.add('sending');

  const ip = await getPublicIP();
  const payload = {
    prenom,
    email,
    crowding:  state.hasCrowding ? 'oui' : 'non',
    ip,
    timestamp: new Date().toISOString()
  };

  try {
    await fetch(GOOGLE_SHEET_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    _showSendSuccess();
  } catch(e) {
    errEl.textContent = t.errorSend;
    errEl.classList.add('show');
    btn.disabled = false;
    btn.classList.remove('sending');
  }
}

function _showSendSuccess() {
  const t = T();
  // Masquer formulaire
  document.getElementById('sendFormWrap').style.display = 'none';
  // Afficher succès
  const sc = document.getElementById('sendSuccess');
  document.getElementById('sendSuccessTitle').textContent = t.sendSuccessTitle;
  document.getElementById('sendSuccessText').textContent = state.hasCrowding
    ? t.sendSuccessCrowding : t.sendSuccessNoCrowding;
  sc.classList.add('show');
  // Afficher boutons navigation
  document.getElementById('resultActions').style.display = 'flex';
}
